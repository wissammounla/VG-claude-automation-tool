<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GQ Curation — AI</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,'Segoe UI',sans-serif;background:#f0f2f5;color:#1a1f2e;font-size:14px;min-height:100vh}
input,select,button,textarea{font-family:inherit}
input::placeholder,textarea::placeholder{color:#9ca3af}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-track{background:#e5e7eb}::-webkit-scrollbar-thumb{background:#d1d5db;border-radius:3px}
.hdr{background:#1a1f2e;border-bottom:1px solid #2d3748;padding:11px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.logo{display:flex;align-items:center;gap:9px}
.logo-mark{width:30px;height:30px;background:#f59e0b;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:17px}
.logo-name{font-weight:700;font-size:15px;color:#fff;letter-spacing:-.3px}
.badge{color:#9ca3af;font-size:11px;background:#2d3748;padding:2px 10px;border-radius:20px;border:1px solid #374151;margin-left:4px}
.hbtns{display:flex;gap:8px;align-items:center}
.main{padding:16px 20px;max-width:1300px;margin:0 auto;padding-bottom:86px}
.btn{border:none;border-radius:7px;padding:7px 14px;font-size:12px;font-weight:600;cursor:pointer;transition:all .12s;display:inline-flex;align-items:center;gap:5px}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn-ghost{background:#fff;border:1px solid #d1d5db;color:#4b5563}
.btn-ghost:hover:not(:disabled){background:#f9fafb;border-color:#9ca3af;color:#1f2937}
.btn-amber{background:#f59e0b;color:#fff;font-weight:700}
.btn-amber:hover:not(:disabled){background:#d97706}
.btn-green{background:#16a34a;color:#fff;font-weight:700}
.btn-green:hover:not(:disabled){background:#15803d}
.btn-blue{background:#2563eb;color:#fff;font-weight:700}
.btn-blue:hover:not(:disabled){background:#1d4ed8}
.btn-red-outline{background:none;border:1px solid #fca5a5;color:#dc2626}
.btn-red-outline:hover:not(:disabled){border-color:#dc2626}
.btn-purple{background:#7c3aed;color:#fff;font-weight:700}
.btn-purple:hover:not(:disabled){background:#6d28d9}
.card{background:#fff;border:1px solid #e5e7eb;border-radius:11px;margin-bottom:12px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.field{background:#fff;border:1.5px solid #d1d5db;color:#1a1f2e;border-radius:7px;padding:8px 11px;width:100%;font-size:13px;transition:border-color .12s}
.field:focus{border-color:#f59e0b;outline:none;box-shadow:0 0 0 3px #f59e0b18}
.field option{background:#fff;color:#1a1f2e}
/* SCREENS */
.screen{min-height:calc(100vh - 52px);display:flex;align-items:center;justify-content:center;padding:24px;background:#f0f2f5}
.screen-card{background:#fff;border:1px solid #e5e7eb;border-radius:16px;padding:36px;max-width:520px;width:100%;text-align:center;box-shadow:0 4px 16px rgba(0,0,0,.08)}
.screen-icon{font-size:48px;margin-bottom:16px}
.screen-title{color:#1a1f2e;font-size:21px;font-weight:700;margin-bottom:8px}
.screen-sub{color:#6b7280;font-size:13px;line-height:1.7;margin-bottom:24px}
.drop-zone{border:2px dashed #d1d5db;border-radius:10px;padding:40px 24px;cursor:pointer;background:#f9fafb;transition:all .2s;margin-bottom:12px}
.drop-zone:hover,.drop-zone.drag{border-color:#f59e0b;background:#fffbeb}
.drop-main{color:#6b7280;font-size:14px}
.err-msg{color:#dc2626;font-size:12px;margin-top:10px}
.hint-text{color:#9ca3af;font-size:11px;line-height:1.7;margin-top:12px}
.api-input{background:#f9fafb;border:1.5px solid #d1d5db;color:#1a1f2e;border-radius:8px;padding:10px 14px;width:100%;font-size:13px;letter-spacing:.5px;margin-bottom:10px}
.api-input:focus{border-color:#f59e0b;outline:none;box-shadow:0 0 0 3px #f59e0b18}
.api-input::placeholder{color:#9ca3af}
.api-note{color:#6b7280;font-size:11px;line-height:1.7;text-align:left;margin-bottom:16px}
/* MAPPING */
.map-screen{min-height:calc(100vh - 52px);display:flex;align-items:center;justify-content:center;padding:20px;background:#f0f2f5}
.map-card{background:#fff;border:1px solid #e5e7eb;border-radius:14px;padding:28px;max-width:580px;width:100%;box-shadow:0 4px 16px rgba(0,0,0,.08)}
.map-title{color:#1a1f2e;font-size:17px;font-weight:700;margin-bottom:6px}
.map-sub{color:#6b7280;font-size:12px;margin-bottom:20px;line-height:1.6}
.map-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px}
.map-row{display:flex;flex-direction:column;gap:5px}
.map-label{font-size:11px;font-weight:600;color:#374151;text-transform:uppercase;letter-spacing:.4px}
.map-req{color:#f59e0b}
.preview-box{background:#f9fafb;border:1px solid #e5e7eb;border-radius:8px;padding:11px;margin-bottom:18px;overflow-x:auto}
.preview-label{color:#9ca3af;font-size:10px;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.preview-box table{font-size:11px;width:100%;border-collapse:collapse}
.preview-box th{padding:4px 8px;color:#6b7280;text-align:left;white-space:nowrap;border-bottom:1px solid #e5e7eb;font-weight:600}
.preview-box td{padding:4px 8px;color:#374151;white-space:nowrap}
/* PROGRESS */
.progress-screen{min-height:calc(100vh - 52px);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:18px;background:#f0f2f5}
.progress-title{color:#1a1f2e;font-size:15px;font-weight:600;text-align:center;max-width:360px}
.progress-sub{color:#6b7280;font-size:12px}
.progress-track{width:340px;height:7px;background:#e5e7eb;border-radius:99px;overflow:hidden}
.progress-fill{height:100%;background:#f59e0b;border-radius:99px;transition:width .25s ease}
/* AI SECTION */
.ai-section{padding:14px 16px}
.ai-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:#d97706;margin-bottom:10px;display:flex;align-items:center;gap:5px}
.ai-textarea{width:100%;background:#f9fafb;border:1.5px solid #d1d5db;color:#1a1f2e;border-radius:8px;padding:10px 13px;font-size:13px;resize:none;line-height:1.55}
.ai-textarea:focus{border-color:#f59e0b;outline:none;box-shadow:0 0 0 3px #f59e0b18}
.ai-textarea::placeholder{color:#9ca3af;line-height:1.6}
/* SCOPE */
.scope-box{background:#f9fafb;border:1px solid #e5e7eb;border-radius:8px;padding:11px 13px;margin-top:10px}
.scope-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;flex-wrap:wrap;gap:6px}
.scope-title{font-size:11px;font-weight:600;color:#6b7280;text-transform:uppercase;letter-spacing:.5px}
.scope-meta{font-size:11px;color:#9ca3af}
.scope-meta b{color:#d97706}
.scope-tags{display:flex;flex-wrap:wrap;gap:6px;max-height:130px;overflow-y:auto}
.scope-tag{display:inline-flex;align-items:center;gap:5px;background:#fff;border:1.5px solid #d1d5db;border-radius:5px;padding:4px 9px;font-size:11px;color:#4b5563;cursor:pointer;transition:all .12s;user-select:none}
.scope-tag:hover{border-color:#9ca3af;color:#1f2937}
.scope-tag.active{background:#fffbeb;border-color:#f59e0b;color:#92400e;font-weight:600}
/* AI CONTROLS */
.ai-controls{display:flex;align-items:center;gap:9px;margin-top:10px;flex-wrap:wrap}
.ai-status{font-size:12px;flex:1;min-width:160px}
.ai-status.ok{color:#16a34a;font-weight:500}
.ai-status.warn{color:#d97706;font-weight:500}
.ai-status.err{color:#dc2626;font-weight:500}
.progress-inline{display:flex;align-items:center;gap:8px;font-size:12px;color:#2563eb;flex:1}
/* FEEDBACK */
.feedback-box{background:#f5f3ff;border:1px solid #ddd6fe;border-radius:8px;padding:12px 14px;margin-top:10px}
.feedback-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:#7c3aed;margin-bottom:8px}
.feedback-row{display:flex;gap:8px;align-items:flex-start;margin-bottom:8px}
.feedback-textarea{flex:1;background:#fff;border:1.5px solid #c4b5fd;color:#1a1f2e;border-radius:7px;padding:8px 10px;font-size:12px;resize:none;line-height:1.5}
.feedback-textarea:focus{border-color:#7c3aed;outline:none;box-shadow:0 0 0 3px #7c3aed18}
.feedback-textarea::placeholder{color:#9ca3af}
.feedback-hist{margin-top:10px;border-top:1px solid #ddd6fe;padding-top:10px}
.feedback-hist-title{font-size:10px;color:#7c3aed;margin-bottom:7px;text-transform:uppercase;letter-spacing:.4px;font-weight:600}
.feedback-item{background:#fff;border:1px solid #ddd6fe;border-radius:6px;padding:8px 10px;margin-bottom:6px;font-size:11px}
.feedback-item-q{color:#6b7280;margin-bottom:3px}
.feedback-item-n{color:#1a1f2e;font-weight:500}
.feedback-item-upcs{color:#9ca3af;margin-top:3px}
/* NAMING */
.naming-box{background:#eff6ff;border:1px solid #bfdbfe;border-radius:8px;padding:12px 14px;margin-top:10px}
.naming-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:#1d4ed8;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.naming-options{display:flex;flex-direction:column;gap:6px}
.naming-option{display:flex;align-items:center;justify-content:space-between;gap:8px;background:#fff;border:1.5px solid #bfdbfe;border-radius:7px;padding:9px 12px;cursor:pointer;transition:all .12s}
.naming-option:hover{border-color:#2563eb;background:#eff6ff}
.naming-option-text{color:#1a1f2e;font-size:13px;font-weight:500}
.naming-option-use{color:#2563eb;font-size:11px;font-weight:600;white-space:nowrap}
/* FILTERS */
.filter-section{padding:12px 16px}
.filter-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.filter-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:#6b7280}
.filters-g1{display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:8px;margin-bottom:8px}
.filters-g2{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px}
.price-pair{display:flex;gap:6px}
.price-pair .field{flex:1}
/* RESULTS */
.results-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px;padding:0 2px;flex-wrap:wrap;gap:8px}
.results-info{font-size:13px;color:#6b7280}
.results-info b{color:#1a1f2e}
.amber{color:#d97706;font-weight:600}
.results-btns{display:flex;gap:7px;flex-wrap:wrap}
/* TABLE */
.tbl-wrap{border:1px solid #e5e7eb;border-radius:11px;overflow:hidden;margin-bottom:12px;box-shadow:0 1px 3px rgba(0,0,0,.05)}
table.main-tbl{width:100%;border-collapse:collapse}
table.main-tbl thead{background:#f9fafb}
table.main-tbl th{padding:9px 11px;text-align:left;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#6b7280;border-bottom:1px solid #e5e7eb}
table.main-tbl td{padding:9px 11px;border-bottom:1px solid #f3f4f6;vertical-align:middle;background:#fff}
table.main-tbl tbody tr{cursor:pointer;transition:background .07s}
table.main-tbl tbody tr:hover td{background:#f9fafb}
table.main-tbl tbody tr.sel-row td{background:#f0fdf4}
table.main-tbl tbody tr:last-child td{border-bottom:none}
.cell-upc{font-family:monospace;color:#9ca3af;font-size:11px}
.cell-name{color:#1a1f2e;max-width:240px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:block;font-weight:500}
.cell-brand{color:#6b7280;font-size:11px;margin-top:1px}
.cell-cat{color:#6b7280;font-size:12px}
.cell-price{color:#16a34a;font-weight:600}
.cell-price-nil{color:#d1d5db}
.ai-badge{display:inline-block;background:#dcfce7;border:1px solid #86efac;color:#16a34a;font-size:10px;padding:1px 6px;border-radius:4px;margin-left:6px;vertical-align:middle;font-weight:600}
input[type=checkbox]{accent-color:#f59e0b;cursor:pointer;width:13px;height:13px}
.cell-empty{text-align:center;padding:50px;color:#9ca3af;font-size:13px}
/* PAGINATION */
.pagination{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:12px}
.page-info{font-size:12px;color:#6b7280}
.page-info b{color:#1a1f2e}
/* EXPORT BAR */
.export-bar{position:fixed;bottom:0;left:0;right:0;background:#1a1f2e;border-top:1px solid #2d3748;padding:11px 20px;display:flex;align-items:center;gap:10px;z-index:99;flex-wrap:wrap}
.camp-input{background:#2d3748;border:1px solid #374151;color:#fff;border-radius:7px;padding:8px 13px;font-size:13px;width:200px}
.camp-input::placeholder{color:#6b7280}
.camp-input:focus{border-color:#f59e0b;outline:none}
.basket-info{font-size:13px;color:#9ca3af;flex:1}
.basket-info b{color:#f59e0b}
/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px}
.modal-box{background:#fff;border:1px solid #e5e7eb;border-radius:14px;padding:24px;width:100%;max-width:480px;max-height:78vh;overflow-y:auto;box-shadow:0 20px 40px rgba(0,0,0,.15)}
.modal-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
.modal-ttl{color:#1a1f2e;font-size:16px;font-weight:700}
.modal-close{background:none;border:none;color:#6b7280;font-size:22px;cursor:pointer}
.cur-row{background:#f9fafb;border:1px solid #e5e7eb;border-radius:9px;padding:13px 15px;margin-bottom:9px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.cur-name{color:#1a1f2e;font-weight:600;font-size:13px}
.cur-meta{color:#6b7280;font-size:11px;margin-top:3px}
.no-cur{color:#9ca3af;text-align:center;padding:30px 0;font-size:13px}
.spin{display:inline-block;width:13px;height:13px;border:2px solid #f59e0b44;border-top-color:#f59e0b;border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;flex-shrink:0}
.spin-lg{width:30px;height:30px;border-width:3px}
.spin-blue{border-color:#2563eb22;border-top-color:#2563eb}
.spin-purple{border-color:#7c3aed22;border-top-color:#7c3aed}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div id="app"></div>
<script>
const PAGE=50, LS_KEY='gq_apikey_v1', LS_CURS='gq_curations_v3', LS_FB='gq_feedback_v1', LS_MAPPING='gq_mapping_v1';
const AI_MODEL='claude-haiku-4-5', BATCH_SIZE=150;

const FIELD_DEFS=[
  {key:'upc',label:'UPC / Barcode',req:true},{key:'name',label:'Product Name',req:true},
  {key:'cat',label:'Category',req:false},{key:'sub',label:'Subcategory',req:false},
  {key:'brand',label:'Brand',req:false},{key:'tags',label:'Tags',req:false},
  {key:'desc',label:'Description',req:false},{key:'price',label:'Price',req:false},
];
const COL_HINTS={
  upc:['upc','barcode','ean','gtin','item code','sku','product code'],
  name:['product name','name','item name','title','product_name'],
  cat:['category','dept','department','aisle'],
  sub:['subcategory','sub category','sub-category','sub_category'],
  brand:['brand','manufacturer','vendor','brand name'],
  tags:['tags','keywords','attributes','labels'],
  desc:['description','desc','details','item description','long description'],
  price:['price','rrp','retail price','unit price','sale price','selling price'],
};

const S={
  view:'apikey',
  apiKey:localStorage.getItem(LS_KEY)||'',
  products:[],aiMatched:new Set(),scopeCats:new Set(),
  meta:null,curations:[],selected:new Set(),
  f:{search:'',cat:'',sub:'',brand:'',tags:'',pMin:'',pMax:''},
  showAiOnly:false,page:1,
  aiQuery:'',aiStatus:'',aiStatusType:'',aiRunning:false,aiProgress:0,aiProgressMsg:'',
  // Feedback
  feedback:[],feedbackText:'',feedbackLoading:false,showFeedback:false,
  // Naming
  namingSuggestions:[],namingLoading:false,
  showSaved:false,campaign:'',uploadErr:'',
  rawHeaders:[],rawRows:[],mapping:{},savedMapping:null,progress:0,progressMsg:'',
};

if(S.apiKey) S.view='upload';
try{S.savedMapping=JSON.parse(localStorage.getItem(LS_MAPPING)||'null');}catch(e){}
try{S.curations=JSON.parse(localStorage.getItem(LS_CURS)||'[]');}catch(e){}
try{S.feedback=JSON.parse(localStorage.getItem(LS_FB)||'[]');}catch(e){}
function saveCurations(){try{localStorage.setItem(LS_CURS,JSON.stringify(S.curations));}catch(e){}}
function saveFeedback(){try{localStorage.setItem(LS_FB,JSON.stringify(S.feedback));}catch(e){}}

function esc(s){return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function g(id){return document.getElementById(id);}
function yieldNow(){return new Promise(r=>setTimeout(r,0));}
function guessCol(headers,key){
  const hints=COL_HINTS[key]||[];
  for(const h of hints){const m=headers.find(c=>c.toLowerCase().trim()===h);if(m)return m;}
  for(const h of hints){const m=headers.find(c=>c.toLowerCase().trim().includes(h));if(m)return m;}
  return '';
}
function uniq(arr){return[...new Set(arr.filter(Boolean))].sort((a,b)=>a.localeCompare(b));}
function allCats(){return uniq(S.products.map(p=>p.cat));}
function allSubs(){const b=S.f.cat?S.products.filter(p=>p.cat===S.f.cat):S.products;return uniq(b.map(p=>p.sub));}
function allBrands(){return uniq(S.products.map(p=>p.brand));}
function buildOpts(list,sel){return list.map(v=>`<option value="${esc(v)}"${sel===v?' selected':''}>${esc(v)}</option>`).join('');}

function getScopeProducts(){
  if(S.scopeCats.size===0)return S.products;
  return S.products.filter(p=>S.scopeCats.has(p.cat));
}
function getFiltered(){
  const{products,f,showAiOnly,aiMatched}=S;
  const terms=f.search?f.search.toLowerCase().split(/[&,|]+/).map(t=>t.trim()).filter(Boolean):[];
  return products.filter(p=>{
    if(showAiOnly&&!aiMatched.has(p.upc))return false;
    if(terms.length){const hay=`${p.name} ${p.brand} ${p.tags} ${p.desc} ${p.cat} ${p.sub}`.toLowerCase();if(!terms.some(t=>hay.includes(t)))return false;}
    if(f.cat&&p.cat!==f.cat)return false;
    if(f.sub&&p.sub!==f.sub)return false;
    if(f.brand&&p.brand!==f.brand)return false;
    if(f.tags&&!p.tags.toLowerCase().includes(f.tags.toLowerCase()))return false;
    if(f.pMin!==''&&p.price<+f.pMin)return false;
    if(f.pMax!==''&&p.price>+f.pMax)return false;
    return true;
  });
}

// Build feedback context for AI prompts
function buildFeedbackContext(){
  if(!S.feedback.length)return '';
  const items=S.feedback.slice(-10).map(fb=>`- Query: "${fb.query}" | Feedback: "${fb.note}"${fb.examples?' | Example products: '+fb.examples:''}`)
    .join('\n');
  return `\n\nPREVIOUS FEEDBACK FROM THIS TEAM (use this to calibrate your selections):\n${items}`;
}

function render(){
  const fid=document.activeElement?.id||null;
  const cp=document.activeElement?.selectionStart??null;
  g('app').innerHTML=buildHTML();
  attachEvents();
  if(fid){const el=g(fid);if(el){el.focus();if(cp!==null&&el.setSelectionRange)try{el.setSelectionRange(cp,cp)}catch(_){}}}
}
function buildHTML(){
  switch(S.view){
    case 'apikey':return buildApiKey();
    case 'upload':return buildUpload();
    case 'mapping':return buildMapping();
    case 'loading':return buildLoading();
    case 'curate':return buildCurate();
    default:return '';
  }
}

function buildApiKey(){
  return`<div class="screen"><div class="screen-card">
    <div class="screen-icon">🔑</div>
    <div class="screen-title">Connect AI</div>
    <p class="screen-sub">This tool uses Claude AI to identify products by meaning — "Ramadan items", "viral TikTok snacks", "kids healthy snacks". You need a free Anthropic API key.</p>
    <input id="apiKeyInput" class="api-input" type="password" placeholder="sk-ant-api03-…" value="${esc(S.apiKey)}">
    <div class="api-note">Get your key at <b>console.anthropic.com</b> → API Keys → Create Key.<br>Stored only in your browser, never shared.</div>
    ${S.uploadErr?`<div class="err-msg">${esc(S.uploadErr)}</div>`:''}
    <button class="btn btn-amber" id="btnSaveKey" style="width:100%;padding:11px;font-size:14px">Save & Continue →</button>
  </div></div>`;
}

function buildUpload(){
  return`<div class="screen"><div class="screen-card">
    <div class="screen-icon">🛒</div>
    <div class="screen-title">GQ Curation Tool</div>
    <p class="screen-sub">Upload your Grocery Quik item master CSV or XLSX. Map column names on the next screen.</p>
    <div class="drop-zone" id="dropZone" onclick="g('fileInput').click()"><div class="drop-main">📁 Click to upload CSV or XLSX</div></div>
    ${S.uploadErr?`<div class="err-msg">${esc(S.uploadErr)}</div>`:''}
    <input type="file" id="fileInput" accept=".csv,.xlsx,.xls" style="display:none">
    <div class="hint-text">Any column names work — you'll map them next.<br><span style="cursor:pointer;text-decoration:underline" id="changeKeyLink">Change API key</span></div>
  </div></div>`;
}

function buildMapping(){
  const H=S.rawHeaders,rows=S.rawRows.slice(0,3),M=S.mapping,ok=M.upc&&M.name;
  const mkSel=key=>`<select class="field" data-mapkey="${key}">
    <option value="">— skip —</option>
    ${H.map(h=>`<option value="${esc(h)}"${M[key]===h?' selected':''}>${esc(h)}</option>`).join('')}
  </select>`;
  return`<div class="map-screen"><div class="map-card">
    <div class="map-title">Map Your Columns</div>
    <div class="map-sub">Found <b style="color:#e2e8f0">${H.length} columns</b> · <b style="color:#f59e0b">${S.rawRows.length.toLocaleString()} products</b>. Match fields — UPC and Name required.
      ${S.savedMapping?'<span style="color:#4ade80;font-size:11px;margin-left:4px">✓ Previous mapping auto-applied — adjust if needed</span>':''}
    </div>
    <div class="map-grid">${FIELD_DEFS.map(f=>`<div class="map-row">
      <div class="map-label">${esc(f.label)}${f.req?'<span class="map-req"> *</span>':''}</div>${mkSel(f.key)}
    </div>`).join('')}</div>
    <div class="preview-box">
      <div class="preview-label">Preview — first 3 rows</div>
      <table><thead><tr>${H.slice(0,7).map(h=>`<th>${esc(h)}</th>`).join('')}</tr></thead>
      <tbody>${rows.map(r=>`<tr>${H.slice(0,7).map(h=>`<td>${esc(String(r[h]??'').slice(0,22))}</td>`).join('')}</tr>`).join('')}</tbody></table>
    </div>
    <div style="display:flex;gap:10px">
      <button class="btn btn-ghost" id="btnBack" style="flex:1">← Back</button>
      <button class="btn btn-amber" id="btnConfirm" ${ok?'':'disabled'} style="flex:2;padding:11px;font-size:13px">✓ Load ${S.rawRows.length.toLocaleString()} Products</button>
    </div>
    ${!ok?`<p style="color:#334155;font-size:11px;text-align:center;margin-top:9px">Select UPC and Product Name to continue</p>`:''}
  </div></div>`;
}

function buildLoading(){
  return`<div class="progress-screen">
    <span class="spin spin-lg"></span>
    <div class="progress-title">${esc(S.progressMsg)}</div>
    <div class="progress-track"><div class="progress-fill" style="width:${S.progress}%"></div></div>
    <div class="progress-sub">${S.progress}% complete</div>
  </div>`;
}

function buildCurate(){
  const filtered=getFiltered(),total=filtered.length;
  const totalPg=Math.max(1,Math.ceil(total/PAGE)),pg=Math.min(S.page,totalPg);
  const pageItems=filtered.slice((pg-1)*PAGE,pg*PAGE);
  const allPgSel=pageItems.length>0&&pageItems.every(p=>S.selected.has(p.upc));
  const selCount=S.selected.size,filtSel=filtered.filter(p=>S.selected.has(p.upc)).length;
  const hasFilter=Object.values(S.f).some(v=>v!=='')||S.showAiOnly;
  const aiCount=S.aiMatched.size;
  const scopeProds=getScopeProducts();
  const cats=allCats();
  const scanCount=scopeProds.length;
  const batches=Math.ceil(scanCount/BATCH_SIZE);
  const estSecs=batches*2,estMin=Math.floor(estSecs/60),estRem=estSecs%60;
  const estStr=estMin>0?`~${estMin}m ${estRem}s`:`~${estSecs}s`;
  const costEst=(scanCount*40/1000000*0.80).toFixed(3);

  const scopeTags=cats.map(c=>{
    const count=S.products.filter(p=>p.cat===c).length,active=S.scopeCats.has(c);
    return`<div class="scope-tag ${active?'active':''}" data-scopecat="${esc(c)}">
      <span>${active?'✓':'○'}</span><span>${esc(c)}</span>
      <span style="color:#1d2535;font-size:10px">(${count.toLocaleString()})</span>
    </div>`;
  }).join('');

  let aiStatusHTML='';
  if(S.aiRunning){
    aiStatusHTML=`<div class="progress-inline"><span class="spin spin-blue"></span><span>${esc(S.aiProgressMsg)}</span>
      <div class="progress-track" style="width:160px;height:4px"><div class="progress-fill" style="width:${S.aiProgress}%"></div></div>
    </div>`;
  }else if(S.aiStatus){
    aiStatusHTML=`<div class="ai-status ${S.aiStatusType}">${esc(S.aiStatus)}</div>`;
  }

  // Feedback section
  const recentFB=S.feedback.slice(-5).reverse();
  const feedbackSection=S.showFeedback?`
    <div class="feedback-box">
      <div class="feedback-title">💬 Feedback — teach the AI what you expect</div>
      <div class="feedback-row">
        <textarea id="feedbackText" class="feedback-textarea" rows="3"
          placeholder="e.g. For Ramadan queries, always include dates, laban, and dried fruits. Exclude alcoholic beverages. When I search 'kids snacks', I want low-sugar items only."
        >${esc(S.feedbackText)}</textarea>
        <div style="display:flex;flex-direction:column;gap:6px">
          <button class="btn btn-purple" id="btnSaveFB" style="font-size:11px;padding:7px 12px;white-space:nowrap">
            ${S.feedbackLoading?'<span class="spin spin-purple"></span>':'💾 Save Feedback'}
          </button>
          <button class="btn btn-ghost" id="btnClearFB" style="font-size:11px;padding:7px 12px" ${!S.feedback.length?'disabled':''}>Clear All</button>
        </div>
      </div>
      <div style="font-size:11px;color:#1d2535;margin-bottom:8px">
        This feedback is saved to your browser and included in every AI scan — the more specific, the better.
        ${S.feedback.length?`<b style="color:#7c3aed">${S.feedback.length} saved notes.</b>`:''}
      </div>
      ${recentFB.length?`<div class="feedback-hist">
        <div class="feedback-hist-title">Saved feedback</div>
        ${recentFB.map((fb,i)=>`<div class="feedback-item">
          <div class="feedback-item-n">${esc(fb.note)}</div>
          <div class="feedback-item-upcs" style="margin-top:4px">
            <button class="btn btn-ghost" data-delfb="${fb.id}" style="font-size:10px;padding:2px 8px;color:#f87171;border-color:#3f1515">Remove</button>
          </div>
        </div>`).join('')}
      </div>`:''}
    </div>`:'';

  // Naming suggestions section
  const namingSection=(S.namingSuggestions.length>0||S.namingLoading)?`
    <div class="naming-box">
      <div class="naming-title">
        ${S.namingLoading?'<span class="spin spin-blue"></span>':'✨'}
        Category Name Suggestions
      </div>
      ${S.namingLoading?`<div style="color:#334155;font-size:12px">Generating name options…</div>`:`
        <div class="naming-options">
          ${S.namingSuggestions.map((name,i)=>`
            <div class="naming-option" data-nameidx="${i}">
              <span class="naming-option-text">${esc(name)}</span>
              <span class="naming-option-use">Use this ↗</span>
            </div>`).join('')}
        </div>
        <div style="font-size:11px;color:#1d2535;margin-top:8px">Click any name to use it as your campaign name and in the export.</div>
      `}
    </div>`:''

  const tableRows=pageItems.map(p=>{
    const sel=S.selected.has(p.upc),aim=S.aiMatched.has(p.upc);
    return`<tr class="${sel?'sel-row':''}" data-upc="${esc(p.upc)}">
      <td><input type="checkbox" ${sel?'checked':''} data-cb="${esc(p.upc)}"></td>
      <td class="cell-upc">${esc(p.upc)}</td>
      <td>
        <span class="cell-name">${esc(p.name)}${aim?'<span class="ai-badge">✓ AI</span>':''}</span>
        ${p.brand?`<span class="cell-brand">${esc(p.brand)}</span>`:''}
      </td>
      <td class="cell-cat">${esc(p.cat)}${p.sub?` / ${esc(p.sub)}`:''}</td>
      <td class="${p.price?'cell-price':'cell-price-nil'}">${p.price?'AED '+p.price.toFixed(2):'—'}</td>
    </tr>`;
  }).join('')||`<tr><td colspan="5" class="cell-empty">No products match.</td></tr>`;

  const pager=totalPg>1?`<div class="pagination">
    <button class="btn btn-ghost" id="pgPrev" ${pg<=1?'disabled':''}>← Prev</button>
    <span class="page-info">Page <b>${pg}</b> of <b>${totalPg}</b> · ${((pg-1)*PAGE+1).toLocaleString()}–${Math.min(pg*PAGE,total).toLocaleString()}</span>
    <button class="btn btn-ghost" id="pgNext" ${pg>=totalPg?'disabled':''}>Next →</button>
  </div>`:`<div style="height:4px"></div>`;

  const modal=S.showSaved?`<div class="modal-overlay" id="modalOverlay"><div class="modal-box">
    <div class="modal-hdr"><span class="modal-ttl">Saved Curations</span><button class="modal-close" id="btnCloseModal">×</button></div>
    ${S.curations.length===0?`<div class="no-cur">No saved curations yet.</div>`:
      S.curations.map(c=>`<div class="cur-row">
        <div><div class="cur-name">${esc(c.name)}</div><div class="cur-meta">${c.count.toLocaleString()} products · ${esc(c.date)}</div></div>
        <div style="display:flex;gap:7px">
          <button class="btn btn-amber" data-load="${c.id}" style="font-size:11px;padding:5px 13px">Load</button>
          <button class="btn btn-red-outline" data-del="${c.id}" style="font-size:11px;padding:5px 10px">✕</button>
        </div>
      </div>`).join('')}
  </div></div>`:'';

  return`
  <div class="hdr">
    <div class="logo">
      <div class="logo-mark">🛒</div>
      <span class="logo-name">GQ Curation</span>
      ${S.meta?`<span class="badge">${S.meta.count.toLocaleString()} products · ${esc(S.meta.date)}</span>`:''}
    </div>
    <div class="hbtns">
      <button class="btn btn-ghost" id="btnSavedOpen">Saved${S.curations.length?` (${S.curations.length})`:''}</button>
      <button class="btn btn-ghost" id="btnNewMaster">↑ New Master</button>
      <input type="file" id="fileInput2" accept=".csv,.xlsx,.xls" style="display:none">
    </div>
  </div>

  <div class="main">
    <!-- AI PANEL -->
    <div class="card">
      <div class="ai-section">
        <div class="ai-label"><svg width="12" height="12" viewBox="0 0 24 24" fill="#f59e0b"><path d="M13 10V3L4 14h7v7l9-11h-7z"/></svg> AI Campaign Identifier</div>
        <textarea id="aiQuery" class="ai-textarea" rows="2"
          placeholder="Examples:&#10;• All Pringles SKUs&#10;• SKUs related to Ramadan&#10;• Viral TikTok Pringles chocolate hack&#10;• Healthy snacks for kids"
        >${esc(S.aiQuery)}</textarea>

        <!-- SCOPE -->
        <div class="scope-box">
          <div class="scope-header">
            <span class="scope-title">Scan Scope (pick categories to limit scan — faster &amp; cheaper)</span>
            <span class="scope-meta">${S.scopeCats.size>0
              ?`<b>${scanCount.toLocaleString()}</b> products · est. <b>${estStr}</b> · ~$<b>${costEst}</b>`
              :`All <b>${S.products.length.toLocaleString()}</b> products · est. <b>${estStr}</b> · ~$<b>${costEst}</b>`}
            </span>
          </div>
          <div class="scope-tags">${scopeTags}</div>
          ${S.scopeCats.size>0?`<div style="margin-top:8px"><button class="btn btn-ghost" id="btnClearScope" style="font-size:11px;padding:3px 10px">Clear scope</button></div>`:''}
        </div>

        <div class="ai-controls">
          <button class="btn btn-amber" id="btnRunAI" ${S.aiRunning?'disabled':''} style="padding:9px 20px;font-size:13px">
            ${S.aiRunning?'<span class="spin"></span> Scanning…':'🔍 Find Matching SKUs'}
          </button>
          ${aiCount>0?`
            <button class="btn ${S.showAiOnly?'btn-blue':'btn-ghost'}" id="btnToggleAiOnly">
              ${S.showAiOnly?`✓ AI matches (${aiCount.toLocaleString()})`:`Show AI matches (${aiCount.toLocaleString()})`}
            </button>
            <button class="btn btn-green" id="btnAddAiAll">＋ Add all to basket</button>
            <button class="btn btn-amber" id="btnSuggestNames" style="font-size:12px">
              ${S.namingLoading?'<span class="spin"></span>':'✨ Suggest Names'}
            </button>
            <button class="btn btn-ghost" id="btnClearAI" style="color:#334155;font-size:11px">✕ Clear AI</button>
          `:''}
          ${aiStatusHTML}
        </div>

        <!-- FEEDBACK TOGGLE -->
        <div style="margin-top:10px;display:flex;align-items:center;gap:8px">
          <button class="btn btn-ghost" id="btnToggleFB" style="font-size:11px;padding:4px 10px;color:${S.feedback.length?'#a78bfa':'#334155'}">
            💬 Feedback${S.feedback.length?` (${S.feedback.length})`:''} ${S.showFeedback?'▲':'▼'}
          </button>
          ${S.feedback.length?`<span style="font-size:11px;color:#1d2535">AI is using your saved preferences</span>`:'<span style="font-size:11px;color:#1d2535">Teach the AI what you like</span>'}
        </div>
        ${feedbackSection}
        ${namingSection}
      </div>
    </div>

    <!-- MANUAL FILTERS -->
    <div class="card">
      <div class="filter-section">
        <div class="filter-hdr">
          <span class="filter-label">Manual Filters ${hasFilter?'<span style="color:#f59e0b">●</span>':''}</span>
          <button class="btn btn-ghost" id="btnClearFilters" style="font-size:11px;padding:4px 10px">Clear filters</button>
        </div>
        <div class="filters-g1">
          <input id="fSearch" class="field" placeholder="Keyword search (use &amp; for OR)…" value="${esc(S.f.search)}">
          <select id="fCat" class="field"><option value="">All Categories</option>${buildOpts(allCats(),S.f.cat)}</select>
          <select id="fSub" class="field"><option value="">All Subcategories</option>${buildOpts(allSubs(),S.f.sub)}</select>
          <select id="fBrand" class="field"><option value="">All Brands</option>${buildOpts(allBrands(),S.f.brand)}</select>
        </div>
        <div class="filters-g2">
          <input id="fTags" class="field" placeholder="Tag keyword…" value="${esc(S.f.tags)}">
          <div class="price-pair">
            <input id="fPMin" class="field" type="number" placeholder="Min AED" value="${esc(S.f.pMin)}">
            <input id="fPMax" class="field" type="number" placeholder="Max AED" value="${esc(S.f.pMax)}">
          </div>
          <div></div><div></div>
        </div>
      </div>
    </div>

    <!-- RESULTS -->
    <div class="results-bar">
      <div class="results-info">
        <b>${total.toLocaleString()}</b> products shown
        ${selCount>0?`&nbsp;·&nbsp;<span class="amber">${selCount.toLocaleString()} in basket</span>`:''}
        ${filtSel>0&&filtSel<total?`<span style="color:#1d2535;font-size:11px"> (${filtSel} visible)</span>`:''}
      </div>
      <div class="results-btns">
        <button class="btn btn-ghost" id="btnAddAll" style="font-size:11px;padding:5px 11px">＋ Add all ${total.toLocaleString()}</button>
        <button class="btn btn-ghost" id="btnRemoveAll" style="font-size:11px;padding:5px 11px;color:#2d3f5a">－ Remove visible</button>
      </div>
    </div>

    <div class="tbl-wrap"><table class="main-tbl">
      <thead><tr>
        <th style="width:36px"><input type="checkbox" id="checkAll" ${allPgSel?'checked':''}></th>
        <th>UPC</th><th>Product / Brand</th><th>Category</th><th>Price</th>
      </tr></thead>
      <tbody>${tableRows}</tbody>
    </table></div>
    ${pager}
  </div>

  <div class="export-bar">
    <input id="campInput" class="camp-input" type="text" placeholder="Campaign / category name…" value="${esc(S.campaign)}">
    <div class="basket-info">${selCount>0?`<b>${selCount.toLocaleString()}</b> products selected`:'<span style="color:#1d2535">Nothing selected yet</span>'}</div>
    <button class="btn btn-ghost" id="btnClearSel" ${!selCount?'disabled':''}>Clear</button>
    <button class="btn btn-ghost" id="btnSaveCur" ${!selCount?'disabled':''} style="font-size:12px">💾 Save</button>
    <button class="btn btn-green" id="btnExport" ${!selCount?'disabled':''} style="font-size:13px;padding:8px 20px">
      ↓ Export XLSX${selCount?` (${selCount.toLocaleString()})`:''}</button>
  </div>
  ${modal}`;
}

function attachEvents(){
  // API key
  const sk=g('btnSaveKey');
  if(sk)sk.onclick=()=>{
    const v=(g('apiKeyInput')?.value||'').trim();
    if(!v.startsWith('sk-ant')){S.uploadErr='Please enter a valid Anthropic API key (starts with sk-ant…)';render();return;}
    S.apiKey=v;S.uploadErr='';localStorage.setItem(LS_KEY,v);S.view='upload';render();
  };
  const fi=g('fileInput');if(fi)fi.onchange=e=>handleFile(e.target.files[0]);
  const dz=g('dropZone');
  if(dz){dz.ondragover=e=>{e.preventDefault();dz.classList.add('drag');};dz.ondragleave=()=>dz.classList.remove('drag');dz.ondrop=e=>{e.preventDefault();dz.classList.remove('drag');handleFile(e.dataTransfer.files[0]);};}
  const ckl=g('changeKeyLink');if(ckl)ckl.onclick=()=>{S.view='apikey';render();};
  // Mapping
  document.querySelectorAll('[data-mapkey]').forEach(sel=>sel.onchange=()=>{S.mapping[sel.dataset.mapkey]=sel.value;render();});
  const back=g('btnBack');if(back)back.onclick=()=>{S.view='upload';render();};
  const conf=g('btnConfirm');if(conf)conf.onclick=confirmMapping;
  // Scope
  document.querySelectorAll('[data-scopecat]').forEach(tag=>tag.onclick=()=>{const c=tag.dataset.scopecat;S.scopeCats.has(c)?S.scopeCats.delete(c):S.scopeCats.add(c);render();});
  const bcs2=g('btnClearScope');if(bcs2)bcs2.onclick=()=>{S.scopeCats.clear();render();};
  // Filters
  const ff={fSearch:v=>{S.f.search=v;S.page=1;},fTags:v=>{S.f.tags=v;S.page=1;},fPMin:v=>{S.f.pMin=v;S.page=1;},fPMax:v=>{S.f.pMax=v;S.page=1;}};
  Object.entries(ff).forEach(([id,fn])=>{const el=g(id);if(el)el.oninput=()=>{fn(el.value);render();};});
  const fCat=g('fCat');if(fCat)fCat.onchange=()=>{S.f.cat=fCat.value;S.f.sub='';S.page=1;render();};
  const fSub=g('fSub');if(fSub)fSub.onchange=()=>{S.f.sub=fSub.value;S.page=1;render();};
  const fBr=g('fBrand');if(fBr)fBr.onchange=()=>{S.f.brand=fBr.value;S.page=1;render();};
  const bcf=g('btnClearFilters');if(bcf)bcf.onclick=()=>{S.f={search:'',cat:'',sub:'',brand:'',tags:'',pMin:'',pMax:''};S.showAiOnly=false;S.page=1;render();};
  // AI
  const aq=g('aiQuery');if(aq)aq.oninput=()=>{S.aiQuery=aq.value;};
  const bai=g('btnRunAI');if(bai)bai.onclick=runAI;
  const bta=g('btnToggleAiOnly');if(bta)bta.onclick=()=>{S.showAiOnly=!S.showAiOnly;S.page=1;render();};
  const baa2=g('btnAddAiAll');if(baa2)baa2.onclick=()=>{S.aiMatched.forEach(u=>S.selected.add(u));render();};
  const bca=g('btnClearAI');if(bca)bca.onclick=()=>{S.aiMatched=new Set();S.aiStatus='';S.showAiOnly=false;S.namingSuggestions=[];render();};
  const bsn=g('btnSuggestNames');if(bsn)bsn.onclick=suggestNames;
  // Feedback
  const btfb=g('btnToggleFB');if(btfb)btfb.onclick=()=>{S.showFeedback=!S.showFeedback;render();};
  const fbt=g('feedbackText');if(fbt)fbt.oninput=()=>{S.feedbackText=fbt.value;};
  const bsfb=g('btnSaveFB');if(bsfb)bsfb.onclick=()=>{
    const note=(g('feedbackText')?.value||S.feedbackText).trim();
    if(!note)return;
    S.feedback.push({id:Date.now(),note,query:S.aiQuery,date:new Date().toLocaleDateString('en-GB')});
    saveFeedback();S.feedbackText='';S.showFeedback=true;render();
  };
  const bcfb=g('btnClearFB');if(bcfb)bcfb.onclick=()=>{if(confirm('Clear all saved feedback?')){S.feedback=[];saveFeedback();render();}};
  document.querySelectorAll('[data-delfb]').forEach(btn=>btn.onclick=()=>{S.feedback=S.feedback.filter(f=>f.id!=btn.dataset.delfb);saveFeedback();render();});
  // Naming options
  document.querySelectorAll('[data-nameidx]').forEach(el=>el.onclick=()=>{
    const name=S.namingSuggestions[+el.dataset.nameidx];
    if(name){S.campaign=name;const ci=g('campInput');if(ci)ci.value=name;render();}
  });
  // Table
  const ca=g('checkAll');
  if(ca)ca.onchange=()=>{const f=getFiltered(),pg2=Math.min(S.page,Math.max(1,Math.ceil(f.length/PAGE)));const items=f.slice((pg2-1)*PAGE,pg2*PAGE);items.forEach(p=>ca.checked?S.selected.add(p.upc):S.selected.delete(p.upc));render();};
  document.querySelectorAll('[data-cb]').forEach(cb=>cb.onchange=()=>{cb.checked?S.selected.add(cb.dataset.cb):S.selected.delete(cb.dataset.cb);render();});
  document.querySelectorAll('tr[data-upc]').forEach(tr=>tr.onclick=e=>{if(e.target.type==='checkbox')return;S.selected.has(tr.dataset.upc)?S.selected.delete(tr.dataset.upc):S.selected.add(tr.dataset.upc);render();});
  const baa=g('btnAddAll');if(baa)baa.onclick=()=>{getFiltered().forEach(p=>S.selected.add(p.upc));render();};
  const bra=g('btnRemoveAll');if(bra)bra.onclick=()=>{getFiltered().forEach(p=>S.selected.delete(p.upc));render();};
  const pgP=g('pgPrev');if(pgP)pgP.onclick=()=>{S.page--;render();};
  const pgN=g('pgNext');if(pgN)pgN.onclick=()=>{S.page++;render();};
  // Export bar
  const ci=g('campInput');if(ci)ci.oninput=()=>{S.campaign=ci.value;};
  const bclr=g('btnClearSel');if(bclr)bclr.onclick=()=>{S.selected.clear();render();};
  const bsv=g('btnSaveCur');if(bsv)bsv.onclick=doSave;
  const bex=g('btnExport');if(bex)bex.onclick=doExport;
  const bnm=g('btnNewMaster');if(bnm)bnm.onclick=()=>g('fileInput2').click();
  const fi2=g('fileInput2');if(fi2)fi2.onchange=e=>{S.products=[];S.meta=null;S.selected.clear();S.aiMatched=new Set();S.scopeCats=new Set();handleFile(e.target.files[0]);fi2.value='';};
  const bso=g('btnSavedOpen');if(bso)bso.onclick=()=>{S.showSaved=true;render();};
  const bcm=g('btnCloseModal');if(bcm)bcm.onclick=()=>{S.showSaved=false;render();};
  const mo=g('modalOverlay');if(mo)mo.onclick=e=>{if(e.target===mo){S.showSaved=false;render();}};
  document.querySelectorAll('[data-load]').forEach(btn=>btn.onclick=()=>{const c=S.curations.find(x=>x.id==btn.dataset.load);if(!c)return;S.selected=new Set(c.upcs);S.campaign=c.name;S.showSaved=false;render();});
  document.querySelectorAll('[data-del]').forEach(btn=>btn.onclick=()=>{S.curations=S.curations.filter(c=>c.id!=btn.dataset.del);saveCurations();render();});
}

// ── AI SCAN ───────────────────────────────────────────────────
async function runAI(){
  const query=(g('aiQuery')?.value||S.aiQuery).trim();
  if(!query){alert('Please describe what you\'re looking for.');return;}
  if(!S.apiKey){alert('No API key set.');return;}
  const scope=getScopeProducts();
  if(!scope.length){alert('No products loaded.');return;}
  S.aiQuery=query;S.aiRunning=true;S.aiMatched=new Set();
  S.aiStatus='';S.showAiOnly=false;S.aiProgress=0;S.namingSuggestions=[];
  S.aiProgressMsg=`Starting scan of ${scope.length.toLocaleString()} products…`;
  render();
  const batches=Math.ceil(scope.length/BATCH_SIZE);
  let matched=0,errors=0;
  const fbContext=buildFeedbackContext();
  for(let b=0;b<batches;b++){
    const batch=scope.slice(b*BATCH_SIZE,(b+1)*BATCH_SIZE);
    S.aiProgressMsg=`Batch ${b+1}/${batches} · ${matched} matches so far…`;
    S.aiProgress=Math.round((b/batches)*100);
    render();
    const lines=batch.map((p,i)=>{
      let l=`${i}|${p.upc}|${p.name}`;
      if(p.brand)l+=`|${p.brand}`;if(p.cat)l+=`|${p.cat}`;if(p.sub)l+=`|${p.sub}`;
      if(p.tags)l+=`|${p.tags}`;if(p.desc)l+=`|${p.desc.slice(0,60)}`;
      return l;
    }).join('\n');
    const prompt=`You are a retail product expert for a UAE grocery app (Grocery Quik by Careem).
Identify which products match this request: "${query}"
Use your knowledge of food, ingredients, viral food trends, UAE/Ramadan culture, health categories, and brand associations.
Format: index|upc|name|brand|category|subcategory|tags|description${fbContext}

Products:
${lines}

Reply with ONLY a JSON array of matching 0-based index numbers. Example: [0,3,7]
If none match: []`;
    try{
      const res=await fetch('https://api.anthropic.com/v1/messages',{
        method:'POST',
        headers:{'Content-Type':'application/json','x-api-key':S.apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-calls':'true'},
        body:JSON.stringify({model:AI_MODEL,max_tokens:512,messages:[{role:'user',content:prompt}]})
      });
      if(!res.ok){const err=await res.json().catch(()=>({}));if(res.status===401){S.aiRunning=false;S.aiStatus='Invalid API key.';S.aiStatusType='err';render();return;}throw new Error(err.error?.message||`HTTP ${res.status}`);}
      const data=await res.json();
      const text=data.content?.find(c=>c.type==='text')?.text||'[]';
      const idxs=JSON.parse(text.replace(/```json|```/g,'').trim());
      if(Array.isArray(idxs)){idxs.forEach(i=>{if(batch[i])S.aiMatched.add(batch[i].upc);});matched+=idxs.length;}
    }catch(err){errors++;if(errors>3){S.aiRunning=false;S.aiStatus=`Error: ${err.message}`;S.aiStatusType='err';render();return;}}
    await yieldNow();
  }
  S.aiRunning=false;S.showAiOnly=true;S.page=1;
  if(matched===0){S.aiStatus=`No matches found. Try rephrasing or selecting different scope categories.`;S.aiStatusType='warn';}
  else{S.aiStatus=`Found ${matched.toLocaleString()} matching SKUs across ${scope.length.toLocaleString()} products scanned.`;S.aiStatusType='ok';}
  render();
}

// ── NAMING SUGGESTIONS ────────────────────────────────────────
async function suggestNames(){
  if(!S.aiQuery||!S.apiKey)return;
  S.namingLoading=true;S.namingSuggestions=[];render();
  const selProds=S.products.filter(p=>S.aiMatched.has(p.upc)).slice(0,30);
  const sample=selProds.map(p=>`${p.name}${p.brand?' ('+p.brand+')':''}`).join(', ');
  const prompt=`You are a category naming expert for a grocery app in UAE (Grocery Quik by Careem).

The merchandising team ran this campaign query: "${S.aiQuery}"
The AI matched ${S.aiMatched.size} products. A sample: ${sample}

Generate exactly 5 short, clear, customer-facing category names for this product selection.
Rules:
- Max 5 words each
- Clear and appealing to UAE grocery shoppers
- Match the theme of the query
- Mix different styles: some descriptive, some occasion-based, some trend-based

Reply with ONLY a JSON array of 5 strings. Example: ["Ramadan Essentials","Iftar Favourites","Date Night Treats","Holy Month Picks","Family Iftar Bundle"]`;
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':S.apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-calls':'true'},
      body:JSON.stringify({model:AI_MODEL,max_tokens:256,messages:[{role:'user',content:prompt}]})
    });
    const data=await res.json();
    const text=data.content?.find(c=>c.type==='text')?.text||'[]';
    const names=JSON.parse(text.replace(/```json|```/g,'').trim());
    if(Array.isArray(names))S.namingSuggestions=names.slice(0,5);
  }catch(err){console.error('Naming error:',err);}
  S.namingLoading=false;render();
}

// ── FILE HANDLING ─────────────────────────────────────────────
function handleFile(file){
  if(!file)return;S.uploadErr='';
  const reader=new FileReader();
  reader.onload=evt=>{
    try{
      const wb=XLSX.read(evt.target.result,{type:'binary'});
      const ws=wb.Sheets[wb.SheetNames[0]];
      const json=XLSX.utils.sheet_to_json(ws,{defval:''});
      if(!json.length){S.uploadErr='File is empty.';render();return;}
      S.rawHeaders=Object.keys(json[0]);S.rawRows=json;S.mapping={};
      FIELD_DEFS.forEach(f=>{S.mapping[f.key]=guessCol(S.rawHeaders,f.key);});
      // Apply saved mapping where column names still exist in this file
      if(S.savedMapping){
        FIELD_DEFS.forEach(f=>{
          const saved=S.savedMapping[f.key];
          if(saved&&S.rawHeaders.includes(saved)) S.mapping[f.key]=saved;
        });
      }
      S.view='mapping';render();
    }catch(err){S.uploadErr='Could not read file — please use a valid CSV or XLSX.';render();}
  };
  reader.readAsBinaryString(file);
}
async function confirmMapping(){
  const{rawRows,mapping:M}=S;if(!M.upc&&!M.name)return;
  S.view='loading';S.progress=0;S.progressMsg=`Processing ${rawRows.length.toLocaleString()} products…`;render();
  const CHUNK=1000,parsed=[];
  for(let i=0;i<rawRows.length;i+=CHUNK){
    for(const row of rawRows.slice(i,i+CHUNK)){
      const upc=String(row[M.upc]??'').trim(),name=String(row[M.name]??'').trim();
      if(!upc&&!name)continue;
      parsed.push({upc,name,cat:M.cat?String(row[M.cat]??'').trim():'',sub:M.sub?String(row[M.sub]??'').trim():'',brand:M.brand?String(row[M.brand]??'').trim():'',tags:M.tags?String(row[M.tags]??'').trim():'',desc:M.desc?String(row[M.desc]??'').trim():'',price:M.price?parseFloat(String(row[M.price]??'').replace(/[^0-9.]/g,''))||0:0});
    }
    S.progress=Math.round(((i+CHUNK)/rawRows.length)*90);
    S.progressMsg=`Processed ${Math.min(i+CHUNK,rawRows.length).toLocaleString()} of ${rawRows.length.toLocaleString()}…`;
    render();await yieldNow();
  }
  S.products=parsed;S.meta={count:parsed.length,date:new Date().toLocaleDateString('en-GB')};
  // Save mapping so next upload auto-applies it
  S.savedMapping={...S.mapping};
  try{localStorage.setItem(LS_MAPPING,JSON.stringify(S.savedMapping));}catch(e){}
  S.rawRows=[];S.view='curate';S.selected.clear();S.f={search:'',cat:'',sub:'',brand:'',tags:'',pMin:'',pMax:''};render();
}

// ── SAVE / EXPORT ─────────────────────────────────────────────
function saveFeedback(){try{localStorage.setItem(LS_FB,JSON.stringify(S.feedback));}catch(e){}}

function doSave(){
  if(!S.selected.size)return;
  const name=(g('campInput')?.value||S.campaign).trim()||'Untitled';
  S.campaign=name;
  S.curations.unshift({id:Date.now(),name,upcs:[...S.selected],count:S.selected.size,date:new Date().toLocaleDateString('en-GB')});
  saveCurations();alert(`Saved "${name}" with ${S.selected.size.toLocaleString()} products.`);
}

function doExport(){
  const camp=(g('campInput')?.value||S.campaign).trim();S.campaign=camp;
  if(!S.selected.size){alert('Nothing selected.');return;}
  const sel=S.products.filter(p=>S.selected.has(p.upc));

  // Tab 1 — Full SKU details for internal reference
  const fullRows=sel.map(p=>({
    'UPC':p.upc,
    'Product Name':p.name,
    'Brand':p.brand,
    'Category':p.cat,
    'Subcategory':p.sub,
    'Price (AED)':p.price||'',
    'Tags':p.tags,
  }));

  // Tab 2 — Backend upload template
  // Columns: upc, start_date, end_date, sub_category_en, sub_category_ar, order, operation_type
  const backendRows=sel.map(p=>({
    'upc':p.upc,
    'start_date':'',
    'end_date':'',
    'sub_category_en':p.sub||p.cat||'',
    'sub_category_ar':'',
    'order':'',
    'operation_type':'',
  }));

  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(fullRows),    'All SKUs');
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(backendRows), 'Backend Upload');

  const fname=(camp||'curation').replace(/[^a-zA-Z0-9_\-\s]/g,'_').trim();
  XLSX.writeFile(wb,`${fname}_${new Date().toISOString().slice(0,10)}.xlsx`);
}

render();
</script>
